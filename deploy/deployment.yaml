apiVersion: apps/v1
kind: Deployment
metadata:
  name: istio-config-exporter
  namespace: monitoring
  labels:
    app: istio-config-exporter
    component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: istio-config-exporter
  template:
    metadata:
      labels:
        app: istio-config-exporter
        component: exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9102"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: istio-config-exporter
      containers:
        - name: istio-config-exporter
          image: shaowenchen/istio-config-exporter:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9102
              protocol: TCP
          args:
            - --web.listen-address=:9102
            - --web.telemetry-path=/metrics
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: istio-config-exporter
  namespace: monitoring
  labels:
    app: istio-config-exporter
    component: exporter
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9102
      targetPort: metrics
      protocol: TCP
  selector:
    app: istio-config-exporter
