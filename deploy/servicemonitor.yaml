apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-config-exporter
  namespace: monitoring
  labels:
    app: istio-config-exporter
    component: exporter
    ops: "true"
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app: istio-config-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
